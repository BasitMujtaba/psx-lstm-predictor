# ─────────────────────────────────────────────────────────────────────────────
# psx-lstm-predictor  |  config.yaml
# ─────────────────────────────────────────────────────────────────────────────

data:
  start_date: "2010-01-01"
  end_date:   "2026-01-31"
  raw_prices_dir:  "data/raw/psx_prices"
  raw_news_dir:    "data/raw/news"
  processed_dir:   "data/processed"
  scalers_dir:     "data/scalers"
  predictions_dir: "data/predictions"
  tickers:
    - "PSO"
    - "OGDC"
    - "PPL"
    - "MARI"
    - "POL"
    - "HBL"
    - "MCB"
    - "UBL"
    - "NBP"
    - "BAFL"
    - "ENGRO"
    - "EFERT"
    - "FATIMA"
    - "FFC"
    - "LUCK"
    - "DGKC"
    - "MLCF"
    - "PIOC"
    - "NML"
    - "NCL"
    - "GATM"
    - "TRG"
    - "SYS"
    - "AVN"
    - "SEARL"
    - "FEROZ"
    - "INDU"
    - "PSMC"
    - "HUBC"
    - "KAPCO"

features:
  input_file_decay: "data/processed/features_decay.csv"
  input_file_flags: "data/processed/features_flags.csv"
  use_flags:        false
  noise_threshold:  0.01
  cols:
    - "ret_1d"
    - "ret_5d"
    - "ret_10d"
    - "ret_20d"
    - "rsi"
    - "macd"
    - "bb_pct"
    - "bb_width"
    - "turbulence"
    - "close_to_ema9"
    - "close_to_ema21"
    - "close_to_ema50"
    - "close_to_high"
    - "close_to_low"
    - "gap_pct"
    - "high_low_range_pct"
    - "volume_ma5_ratio"
    - "volume_ma20_ratio"
    - "vol_ratio_5_20"
    - "rolling_vol_10"
    - "rolling_vol_20"
    - "volume_trend"
    - "52w_high_ratio"
    - "52w_low_ratio"
    - "near_upper_circuit"
    - "near_lower_circuit"
    - "day_of_week"
    - "month"
    - "sentiment_relevant"
    - "sentiment_ticker"
    - "news_count"
  target:      "target"
  n_features:  31

model:
  input_size:      31
  seq_len:         20
  lstm_hidden:     32
  lstm_layers:     1
  lstm_dropout:    0.6
  num_heads:       2
  cross_heads:     1
  fc_hidden:       32
  use_ensemble:    false
  xgb_trees:       300
  xgb_depth:       6
  xgb_lr:          0.02
  rf_trees:        200
  rf_depth:        14
  checkpoints_dir: "src/models/checkpoints"

training:
  max_epochs:    50
  batch_size:    256
  lr:            0.0003
  patience:      10
  grad_clip:     1.0
  weight_decay:  0.02
  lr_factor:     0.5
  lr_patience:   5
  num_workers:   2
  warmup_epochs: 3
  train_ratio:   0.70
  val_ratio:     0.15
  label_smooth:  0.15

news:
  finbert_model: "ProsusAI/finbert"
  sleep_sec:     2.5
  chunk_months:  3
  max_per_chunk: 50
