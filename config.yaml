# ─────────────────────────────────────────────
# psx-lstm-predictor  |  config.yaml
# Central configuration for all pipeline steps
# ─────────────────────────────────────────────

data:
  start_date: "2010-01-01"
  end_date:   "2026-01-31"
  train_end:  "2024-01-01"
  test_start: "2024-01-01"
  test_end:   "2026-01-31"
  raw_prices_dir:  "data/raw/psx_prices"
  raw_news_dir:    "data/raw/news"
  processed_dir:   "data/processed"
  predictions_dir: "data/predictions"
  tickers:
    - "PSO.KA"
    - "OGDC.KA"
    - "PPL.KA"
    - "MARI.KA"
    - "POL.KA"
    - "HBL.KA"
    - "MCB.KA"
    - "UBL.KA"
    - "NBP.KA"
    - "BAFL.KA"
    - "ENGRO.KA"
    - "EFERT.KA"
    - "FATIMA.KA"
    - "FFC.KA"
    - "LUCK.KA"
    - "DGKC.KA"
    - "MLCF.KA"
    - "PIOC.KA"
    - "NML.KA"
    - "NCL.KA"
    - "GATM.KA"
    - "TRG.KA"
    - "SYS.KA"
    - "AVN.KA"
    - "SEARL.KA"
    - "FEROZ.KA"
    - "INDU.KA"
    - "PSMC.KA"
    - "HUBC.KA"
    - "KAPCO.KA"

features:
  cols:
    - "macd_pct"
    - "macd_sig_pct"
    - "macd_hist_pct"
    - "rsi_norm"
    - "cci_norm"
    - "di_plus_norm"
    - "di_minus_norm"
    - "adx_norm"
    - "di_diff_norm"
    - "atr_pct"
    - "bb_pct_b"
    - "bb_width"
    - "obv_pct"
    - "turbulence"
    - "close_to_high"
    - "close_to_low"
    - "high_low_range_pct"
    - "gap_pct"
    - "ret_1d"
    - "ret_5d"
    - "ret_10d"
    - "ret_20d"
    - "vol_ratio_5_20"
    - "sentiment_score"
    - "macro_pakistan_score"
    - "psx_market_score"
    - "energy_oil_score"
    - "banking_finance_score"
    - "geopolitical_global_score"
    - "political_stability_score"
    - "pakistani_media_score"
    - "international_media_pakistan_score"
  target:       "daily_return"
  target_price: "close"

model:
  architecture:    "lstm"
  type:            "lstm"
  seq_len:         20
  lstm_hidden:     128
  lstm_layers:     2
  lstm_dropout:    0.2
  tf_d_model:      64
  tf_nhead:        4
  tf_layers:       2
  tf_dropout:      0.1
  input_size:      32            # confirmed — len(FEATURE_COLS) = 32
  checkpoints_dir: "src/models/checkpoints"

training:
  max_epochs:     30
  epochs:         30
  batch_size:     64
  lr:             0.001
  patience:       30             # matches max_epochs — no early stopping
  seq_len:        20
  grad_clip:      1.0
  weight_decay:   0.0001
  lr_factor:      0.5
  lr_patience:    5
  num_workers:    4
  checkpoint_dir: "src/models/checkpoints"

news:
  finbert_model: "ProsusAI/finbert"
  sleep_sec:     2.5
  chunk_months:  3
  max_per_chunk: 50
