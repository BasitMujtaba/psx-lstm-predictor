# ─────────────────────────────────────────────
# psx-lstm-predictor  |  config.yaml
# Central configuration for all pipeline steps
# ─────────────────────────────────────────────

data:
  start_date: "2010-01-01"
  end_date:   "2026-01-31"
  train_end:  "2024-01-01"
  test_start: "2024-01-01"
  test_end:   "2026-01-31"
  raw_prices_dir:  "data/raw/psx_prices"
  raw_news_dir:    "data/raw/news"
  processed_dir:   "data/processed"
  predictions_dir: "data/predictions"
  tickers:
    - "PSO.KA"
    - "OGDC.KA"
    - "PPL.KA"
    - "MARI.KA"
    - "POL.KA"
    - "HBL.KA"
    - "MCB.KA"
    - "UBL.KA"
    - "NBP.KA"
    - "BAFL.KA"
    - "ENGRO.KA"
    - "EFERT.KA"
    - "FATIMA.KA"
    - "FFC.KA"
    - "LUCK.KA"
    - "DGKC.KA"
    - "MLCF.KA"
    - "PIOC.KA"
    - "NML.KA"
    - "NCL.KA"
    - "GATM.KA"
    - "TRG.KA"
    - "SYS.KA"
    - "AVN.KA"
    - "SEARL.KA"
    - "FEROZ.KA"
    - "INDU.KA"
    - "PSMC.KA"
    - "HUBC.KA"
    - "KAPCO.KA"

features:
  cols:
    - "daily_return"
    - "log_return"
    - "hl_range"
    - "close_open_ratio"
    - "volume_ratio"
    - "rolling_vol_10"
    - "rolling_vol_20"
    - "price_ma5_ratio"
    - "price_ma10_ratio"
    - "price_ma20_ratio"
    - "rsi"
    - "cci"
    - "dmi_dx"
    - "macd_ratio"
    - "turbulence"
    - "sentiment_score"
    - "lag1_return"
    - "lag2_return"
  target:       "daily_return"   # predict next-day return, not price
  target_price: "close"          # used only for inverse-transform display

model:
  architecture:    "lstm"
  type:            "lstm"
  seq_len:         20            # reduced from 30 — faster per batch
  lstm_hidden:     128           # reduced from 256 — faster forward pass
  lstm_layers:     2             # reduced from 3 — faster training
  lstm_dropout:    0.2
  tf_d_model:      64
  tf_nhead:        4
  tf_layers:       2
  tf_dropout:      0.1
  input_size:      32
  checkpoints_dir: "src/models/checkpoints"

training:
  max_epochs:     30             # reduced from 150 — fast per-ticker run
  epochs:         30             # legacy alias
  batch_size:     64             # increased from 32 — faster epoch
  lr:             0.001          # higher lr — converges faster
  patience:       30             # matches max_epochs — no early stopping
  seq_len:        20             # matches model.seq_len
  grad_clip:      1.0
  weight_decay:   0.0001
  lr_factor:      0.5
  lr_patience:    5
  num_workers:    4              # increased — faster data loading
  checkpoint_dir: "src/models/checkpoints"

news:
  finbert_model: "ProsusAI/finbert"
  sleep_sec:     2.5
  chunk_months:  3
  max_per_chunk: 50
