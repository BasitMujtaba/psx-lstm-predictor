# ─────────────────────────────────────────────
# psx-lstm-predictor  |  config.yaml
# Central configuration for all pipeline steps
# ─────────────────────────────────────────────

data:
  start_date: "2010-01-01"
  end_date:   "2026-01-31"
  train_end:  "2024-01-01"
  test_start: "2024-01-01"
  test_end:   "2026-01-31"
  raw_prices_dir:  "data/raw/psx_prices"
  raw_news_dir:    "data/raw/news"
  processed_dir:   "data/processed"
  predictions_dir: "data/predictions"
  tickers:
    - "PSO.KA"
    - "OGDC.KA"
    - "PPL.KA"
    - "MARI.KA"
    - "POL.KA"
    - "HBL.KA"
    - "MCB.KA"
    - "UBL.KA"
    - "NBP.KA"
    - "BAFL.KA"
    - "ENGRO.KA"
    - "EFERT.KA"
    - "FATIMA.KA"
    - "FFC.KA"
    - "LUCK.KA"
    - "DGKC.KA"
    - "MLCF.KA"
    - "PIOC.KA"
    - "NML.KA"
    - "NCL.KA"
    - "GATM.KA"
    - "TRG.KA"
    - "SYS.KA"
    - "AVN.KA"
    - "SEARL.KA"
    - "FEROZ.KA"
    - "INDU.KA"
    - "PSMC.KA"
    - "HUBC.KA"
    - "KAPCO.KA"

features:
  cols:
    # ── MACD family ───────────────────────────────────────
    - "macd_pct"
    - "macd_sig_pct"
    - "macd_hist_pct"
    # ── Momentum oscillators ──────────────────────────────
    - "rsi_norm"
    - "cci_norm"
    - "williams_r_norm"
    - "stoch_k_norm"
    - "stoch_d_norm"
    - "roc_5_norm"
    - "roc_10_norm"
    # ── Directional movement ──────────────────────────────
    - "di_plus_norm"
    - "di_minus_norm"
    - "adx_norm"
    - "di_diff_norm"
    # ── Volatility ────────────────────────────────────────
    - "atr_pct"
    - "bb_pct_b"
    - "bb_width"
    - "rolling_vol_10"
    - "rolling_vol_20"
    - "parkinson_vol"
    # ── Volume ────────────────────────────────────────────
    - "obv_pct"
    - "volume_ma5_ratio"
    - "volume_ma20_ratio"
    # ── Price structure ───────────────────────────────────
    - "turbulence"
    - "close_to_high"
    - "close_to_low"
    - "high_low_range_pct"
    - "gap_pct"
    # ── Lagged returns ────────────────────────────────────
    - "ret_1d"
    - "ret_5d"
    - "ret_10d"
    - "ret_20d"
    - "ret_60d"
    # ── Cross-sectional ───────────────────────────────────
    - "vol_ratio_5_20"
    - "market_return"
    - "relative_strength"
    - "sector_return"
    # ── Sentiment ─────────────────────────────────────────
    - "sentiment_score"
    - "macro_pakistan_score"
    - "psx_market_score"
    - "energy_oil_score"
    - "banking_finance_score"
    - "geopolitical_global_score"
    - "political_stability_score"
    - "pakistani_media_score"
    - "international_media_pakistan_score"
    - "sentiment_ma5"
  target:       "ret_1d_future"
  target_price: "close"
  n_features:   47

model:
  architecture:    "lstm"
  type:            "lstm"
  seq_len:         60
  input_size:      47
  lstm_hidden:     256
  lstm_layers:     4
  lstm_dropout:    0.3
  num_heads:       8
  cross_heads:     4
  fc_hidden:       256
  use_ensemble:    true
  xgb_trees:       1000
  xgb_depth:       6
  xgb_lr:          0.02
  rf_trees:        500
  rf_depth:        14
  tf_d_model:      64
  tf_nhead:        4
  tf_layers:       2
  tf_dropout:      0.1
  checkpoints_dir: "src/models/checkpoints"

training:
  max_epochs:      80
  epochs:          80
  batch_size:      32
  lr:              0.001
  patience:        15
  seq_len:         60
  grad_clip:       0.5
  weight_decay:    0.0001
  lr_factor:       0.4
  lr_patience:     5
  num_workers:     2
  checkpoint_dir:  "src/models/checkpoints"
  loss:            "gaussian_nll"
  warmup_epochs:   5

news:
  finbert_model: "ProsusAI/finbert"
  sleep_sec:     2.5
  chunk_months:  3
  max_per_chunk: 50
