# config.yaml
# ============
# Single source of truth for all pipeline settings.

# =============================================================================
# Data settings
# =============================================================================
data:
  start_date:       "2010-01-01"
  end_date:         "2026-01-31"

  raw_prices_dir:   "data/raw/psx_prices"
  raw_news_dir:     "data/raw/news"
  processed_dir:    "data/processed"
  predictions_dir:  "data/predictions"

  tickers:
    - "OGDC.KA"
    - "PPL.KA"
    - "LUCK.KA"
    - "HBL.KA"
    - "MCB.KA"
    - "UBL.KA"
    - "ENGRO.KA"
    - "EFERT.KA"
    - "FFC.KA"
    - "DGKC.KA"


# =============================================================================
# News / sentiment settings
# =============================================================================
news:
  finbert_model:    "ProsusAI/finbert"
  chunk_months:     1
  max_per_chunk:    20
  sleep_sec:        1.5


# =============================================================================
# Technical indicator settings
# =============================================================================
indicators:
  macd_fast:              12
  macd_slow:              26
  macd_signal:             9
  rsi_period:             14
  cci_period:             20
  dmi_period:             14
  atr_period:             14
  bb_period:              20
  bb_std:                2.0
  obv_period:             14
  turbulence_lookback:   252
  turbulence_min_periods: 60


# =============================================================================
# Model architecture
# =============================================================================
model:
  architecture:        "lstm"
  input_size:          26
  checkpoints_dir:     "src/models/checkpoints"

  hidden_size:         128
  num_layers:          2
  dropout:             0.2
  fc_hidden:           64

  nhead:               4
  dim_feedforward:     256
  num_encoder_layers:  2


# =============================================================================
# Training settings
# =============================================================================
training:
  seq_len:       30
  batch_size:    64
  max_epochs:    100
  patience:      15
  lr:            0.001
  weight_decay:  0.0001
  lr_factor:     0.5
  lr_patience:   7
  grad_clip:     1.0
  train_ratio:   0.70
  val_ratio:     0.15
  num_workers:   2


# =============================================================================
# Plot settings
# =============================================================================
plots:
  dpi:      150
  figsize:  [14, 5]
  show:     false
